<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDE9FE"/>
      <stop offset="100%" stop-color="#DDD6FE"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <!-- Owl body -->
  <ellipse cx="256" cy="310" rx="130" ry="150" fill="#6D28D9"/>
  <!-- Belly -->
  <ellipse cx="256" cy="340" rx="80" ry="95" fill="url(#belly)"/>
  <!-- Wings -->
  <path d="M126 260 Q80 310 100 380 Q140 320 180 300 Z" fill="#5B21B6"/>
  <path d="M386 260 Q432 310 412 380 Q372 320 332 300 Z" fill="#5B21B6"/>
  <!-- Head -->
  <ellipse cx="256" cy="200" rx="115" ry="110" fill="#7C3AED"/>
  <!-- Ear tufts -->
  <path d="M160 110 L140 55 L195 100 Z" fill="#5B21B6"/>
  <path d="M352 110 L372 55 L317 100 Z" fill="#5B21B6"/>
  <!-- Face: white around eyes -->
  <ellipse cx="210" cy="200" rx="52" ry="52" fill="white"/>
  <ellipse cx="302" cy="200" rx="52" ry="52" fill="white"/>
  <!-- Eyes: pupils -->
  <circle cx="210" cy="200" r="36" fill="#1E1B4B"/>
  <circle cx="302" cy="200" r="36" fill="#1E1B4B"/>
  <!-- Eye highlights -->
  <circle cx="222" cy="190" r="11" fill="white"/>
  <circle cx="314" cy="190" r="11" fill="white"/>
  <circle cx="226" cy="193" r="5" fill="white" opacity="0.7"/>
  <circle cx="318" cy="193" r="5" fill="white" opacity="0.7"/>
  <!-- Beak -->
  <path d="M237 228 L256 260 L275 228 Q256 215 237 228 Z" fill="#F59E0B"/>
  <!-- Between eyes bridge -->
  <rect x="244" y="172" width="24" height="14" rx="7" fill="#6D28D9"/>
  <!-- Feet -->
  <path d="M210 450 Q196 480 182 490 M210 450 Q210 485 200 495 M210 450 Q224 480 230 492" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M302 450 Q288 480 274 490 M302 450 Q302 485 292 495 M302 450 Q316 480 322 492" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- Voxa text hint at bottom -->
  <text x="256" y="500" font-family="Arial Black,sans-serif" font-size="52" font-weight="900" fill="white" opacity="0.25" text-anchor="middle" letter-spacing="-2">VOXA</text>
</svg>